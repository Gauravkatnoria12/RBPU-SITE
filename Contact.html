    <link rel="stylesheet" href="styles.css">
</head>

<body>


    <!-- Navigation -->


    <nav>
        <div class="logo"><img src="logo.png" height="60px" width="70px"></div>
        <ul id="menuList">
            <li><a href="index.html">HOME</a></li>
            <li><a href="Register.html">REGISTER</a></li>
            <li><a href="AboutUs.html">ABOUT</a></li>
            <li><a href="Contact.html">CONTACT</a></li>
        </ul>

        <div class="menu"><span class="material-symbols-outlined">menu</span>
            <div class="menu-items">
                <ul class="menuu">
                    <a href="index.html">
                        <li>HOME</li>
                    </a>
                    <a href="Register.html">
                        <li>REGISTER</li>
                    </a>
                    <a href="AboutUs.html">
                        <li>ABOUT</li>

                    <a href="Contact.html">
                        <li>CONTACT</li>
                    </a>
                </ul>
            </div>
        </div>
    </nav>



    <!-- Main Section -->


    <section class="main" id="home">
        <div class="main-content">
            <h1>CONTACT us</h1>
            <p>RBPU Hoshiarpur</p>
        </div>
    </section>

    <!-- Contact Page-->

    <div class="contact-page">
        <section class="contact-section">
            <div class="contact-content">
                <h1>CONTACT Form</h1>
                <table>
                    <form>
                        <tr>
                            <td>
                                <label for="name">Name</label>
                            </td>
                            <td>
                                <input type="text" id="name" name="name" placeholder="Enter name">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="phone">Phone</label>
                            </td>
                            <td>
                                <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="email">Email</label>
                            </td>
                            <td>
                                <input type="email" id="email" name="email" placeholder="Enter email">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="message">Message</label>
                            </td>
                            <td>
                                <textarea id="message" name="message" placeholder="Enter message"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="submit">
                            </td>
                        </tr>
                    </form>
                </table>
            </div>
        </section>
    </div>


    <section>
        <p class="contact-para">CONTACT NO. - 9090XXXX00, 8080XXXX00</p>
    </section>


    <!-- Footer -->


    <footer>
        <p>RBPU Hoshiarpur | Privacy Policy | Terms & Conditions | Contact</p>
        <div class="social">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-linkedin"></i>
        </div>
    </footer>
</body>

</html>
