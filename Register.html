<body>


    <!-- Navigation -->


    <nav>
        <div class="logo"><img src="logo.png" height="60px" width="70px"></div>
        <ul id="menuList">
            <li><a href="index.html">HOME</a></li>

                    <a href="Register.html">

                        <li>CONTACT</li>
                    </a>
                </ul>
            </div>
        </div>
    </nav>



    <!-- Main Section -->


    <section class="main" id="home">
        <div class="main-content">
            <h1>REGISTER here</h1>
            <p>@Apply Now</p>
        </div>
    </section>

    <!-- Contact Page-->

    <div class="contact-page">
        <section class="contact-section">
            <div class="contact-content">
                <h1>Registeration Form</h1>
                <table>
                    <form>
                        <tr>
                            <td>
                                <label for="name">Name</label>
                            </td>
                            <td>
                                <input type="text" id="name" name="name" placeholder="Enter name">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="phone">Phone No.</label>
                            </td>
                            <td>
                                <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="email">Email</label>
                            </td>
                            <td>
                                <input type="email" id="email" name="email" placeholder="Enter email">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="Adhaar">Adhaar No.</label>
                            </td>
                            <td>
                                <input type="tel" id="Adhaar" name="Adhaar" placeholder="Enter Adhaar">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="State">State</label>
                            </td>
                            <td>
                                <select name="State" id="State">
                                    <option value="">Select State</option>
                                    <option value="Punjab">Punjab</option>
                                    <option value="Haryana">Haryana</option>
                                    <option value="Himachal">Himachal Pradesh</option>
                                    <option value="Delhi">Delhi</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="father">Father name</label>
                            </td>
                            <td>
                                <input id="father" name="Father name" placeholder="Enter Father name">
                            </td>
                        </tr>
                        <tr>
                        <tr>
                            <td>
                                <label for="mother">Mother name</label>
                            </td>
                            <td>
                                <input id="mother" name="Mother name" placeholder="Enter Mother name">
                            </td>
                        </tr>
                        <tr>
                        <tr>
                            <td>
                                <label for="Depart">Department</label>
                            </td>
                            <td>
                                <select name="Department" id="Department">
                                    <option value="">Select Department</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Medical">Medical</option>
                                    <option value="Pharmacy">Pharmacy</option>
                                    <option value="Hotel-Management">Hotel-Management</option>
                                    <option value="Law">Law</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <label for="State">State</label>
                            </td>
                            <td>
                                <select name="State" id="State">
                                    <option value="">Select Branch</option>
                                    <option value="AIML">CSE AIML</option>
                                    <option value="CSE">CSE</option>
                                    <option value="IT">IT</option>
                                    <option value="CIVIL">CIVIL</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="submit">
                            </td>
                            <td>
                                <input type="reset">
                            </td>
                        </tr>
                    </form>
                </table>
            </div>
        </section>
    </div>

    <!-- Footer -->


    <footer>
        <p>RBPU Hoshiarpur | Privacy Policy | Terms & Conditions | Contact</p>
        <div class="social">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-linkedin"></i>
        </div>
    </footer>
</body>

</html>
